# doc_mapping.yaml
# Maps Twingate documentation URLs to the skill that owns them.
# This file seeds the auto-update pipeline. New docs discovered via sitemap
# diff are auto-assigned using the patterns below, then added here.
#
# Schema:
#   docs[].url     — full Twingate docs URL
#   docs[].skill   — skill name (twingate-{domain})
#   docs[].keywords — optional list of keywords for summary context
#
# Auto-assign patterns apply to URLs not yet in this list.
# First matching pattern wins.

